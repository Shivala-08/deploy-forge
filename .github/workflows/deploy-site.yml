name: Deploy Site to Mesh

on:
  repository_dispatch:
    types: [deploy-site]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout DeployForge repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOYFORGE_PAT }}
          fetch-depth: 0

      - name: Report build start back to DeployForge
        run: |
          curl -X POST "${{ github.event.client_payload.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.client_payload.callbackToken }}" \
            -d '{"status": "BUILDING", "deploymentId": "${{ github.event.client_payload.deploymentId }}", "runId": "${{ github.run_id }}"}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone target repo
        run: |
          git clone \
            https://x-access-token:${{ secrets.DEPLOYFORGE_PAT }}@github.com/${{ github.event.client_payload.repoFullName }}.git \
            /tmp/target-site

      - name: Install dependencies
        run: |
          cd /tmp/target-site
          npm install --legacy-peer-deps

      - name: Patch Next.js config for subpath hosting
        run: |
          node scripts/patch-nextconfig.js /tmp/target-site "${{ github.event.client_payload.siteId }}"

      - name: Build site
        run: |
          cd /tmp/target-site
          ${{ github.event.client_payload.buildCommand }}
        env:
          NODE_ENV: production

      - name: Copy built files into DeployForge mesh
        run: |
          SITE_ID="${{ github.event.client_payload.siteId }}"
          OUTPUT_DIR="${{ github.event.client_payload.outputDir }}"

          # Auto-detect the real output directory if configured one doesn't exist
          RESOLVED_DIR=""
          for candidate in "${OUTPUT_DIR}" "out" "dist" "build" ".next" "."; do
            if [ -n "${candidate}" ] && [ -d "/tmp/target-site/${candidate}" ]; then
              if [ "${candidate}" = ".next" ]; then
                if [ -d "/tmp/target-site/.next/static" ]; then
                  RESOLVED_DIR="${candidate}"
                  break
                fi
              else
                if ls /tmp/target-site/${candidate}/index.html \
                      /tmp/target-site/${candidate}/_next \
                      /tmp/target-site/${candidate}/index.js 2>/dev/null | head -1 | grep -q .; then
                  RESOLVED_DIR="${candidate}"
                  break
                fi
              fi
            fi
          done

          if [ -z "${RESOLVED_DIR}" ]; then
            echo "ERROR: Could not find build output. Tried: ${OUTPUT_DIR}, out, dist, build, .next"
            echo "Contents of /tmp/target-site/:"
            ls /tmp/target-site/
            exit 1
          fi

          echo "Using output directory: ${RESOLVED_DIR}"

          # Clean old deployment
          rm -rf "public/sites/${SITE_ID}"
          mkdir -p "public/sites/${SITE_ID}"

          # Copy new build
          cp -r /tmp/target-site/${RESOLVED_DIR}/. "public/sites/${SITE_ID}/"

          echo "Files deployed:"
          ls "public/sites/${SITE_ID}/"

      - name: Rewrite asset paths for subpath hosting
        run: |
          node scripts/rewrite-paths.js "public/sites/${{ github.event.client_payload.siteId }}" "${{ github.event.client_payload.siteId }}"

      - name: Commit and push to trigger Vercel redeploy
        run: |
          git config user.name "DeployForge Bot"
          git config user.email "bot@deployforge.app"

          git add public/sites/ scripts/
          git commit -m "Deploy: ${{ github.event.client_payload.siteId }} (${{ github.event.client_payload.commitSha }})"
          git push

      - name: Report success back to DeployForge
        run: |
          curl -X POST "${{ github.event.client_payload.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.client_payload.callbackToken }}" \
            -d '{"status": "READY", "deploymentId": "${{ github.event.client_payload.deploymentId }}"}'

      - name: Report failure if any step failed
        if: failure()
        run: |
          curl -X POST "${{ github.event.client_payload.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.client_payload.callbackToken }}" \
            -d '{"status": "ERROR", "deploymentId": "${{ github.event.client_payload.deploymentId }}", "error": "Build failed"}'
