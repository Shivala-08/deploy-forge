name: Rollback Site

on:
  repository_dispatch:
    types: [rollback-site]

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout DeployForge repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOYFORGE_PAT }}
          fetch-depth: 0

      - name: Restore previous deployment
        run: |
          SITE_ID="${{ github.event.client_payload.siteId }}"
          PREV_SHA="${{ github.event.client_payload.previousCommitSha }}"

          echo "Rolling back ${SITE_ID} to ${PREV_SHA}"

          # Restore only the site's folder from the previous commit
          git checkout ${PREV_SHA} -- public/sites/${SITE_ID}/

      - name: Commit rollback (with retry)
        run: |
          git config user.name "DeployForge Bot"
          git config user.email "bot@deployforge.app"
          git add public/sites/
          git commit -m "⏪ Rollback: ${{ github.event.client_payload.siteId }} to ${{ github.event.client_payload.previousCommitSha }}" || { echo "No changes to commit"; exit 0; }

          MAX_ATTEMPTS=3
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Push attempt $ATTEMPT of $MAX_ATTEMPTS"
            git fetch origin main
            git rebase origin/main
            if git push --force-with-lease; then
              echo "Push succeeded"
              break
            fi
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "::error::Git push failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep $((ATTEMPT * 5))
          done

      - name: Smoke test rolled back site
        run: |
          CALLBACK_URL="${{ github.event.client_payload.callbackUrl }}"
          BASE_URL=$(echo "$CALLBACK_URL" | sed -E 's|/api/.*||')
          SITE_URL="${BASE_URL}/sites/${{ github.event.client_payload.siteId }}/"
          MAX_WAIT=120
          ELAPSED=0
          
          echo "Waiting for ${SITE_URL} to go live..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Site is live (HTTP 200)"
              exit 0
            fi
            echo "HTTP ${STATUS} — waiting..."
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          
          echo "::error::Site did not go live within ${MAX_WAIT}s"
          exit 1

      - name: Report success
        run: |
          curl -X POST "${{ github.event.client_payload.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.client_payload.callbackToken }}" \
            -d "{\"deploymentId\": \"${{ github.event.client_payload.deploymentId }}\", \"status\": \"READY\"}"

      - name: Report failure
        if: failure()
        run: |
          curl -X POST "${{ github.event.client_payload.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.client_payload.callbackToken }}" \
            -d "{\"deploymentId\": \"${{ github.event.client_payload.deploymentId }}\", \"status\": \"ERROR\", \"error\": \"Rollback failed\"}"
